name: ML CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ml/**'
      - '.github/workflows/ci-ml.yml'
  pull_request:
    paths:
      - 'ml/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Run model smoke tests
        run: |
          python -c "from src.models.multi_stream_cnn_lstm import build_multi_stream_cnn_lstm; m = build_multi_stream_cnn_lstm(); print('Multi-stream params:', m.count_params())"
          python -c "from src.models.baseline_cnn_lstm import build_baseline_cnn_lstm; m = build_baseline_cnn_lstm(); print('Baseline params:', m.count_params())"

      - name: Run unit tests
        run: pytest tests/ -v
        continue-on-error: true
